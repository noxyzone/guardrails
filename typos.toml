[files]
extend-exclude = [
  ".claude/cache/",
  ".claude/plans/",
  ".claude/plugins/",
  ".claude/projects/",
  ".claude/shell-snapshots/",
  ".claude/todos/",
  ".codex/cache/",
  "artifacts/",
  "contrib/",
  "node_modules/",
  "pipedream/html/",
  "Vendor/",
]

[default]
check-filename = true
check-file = true
extend-ignore-re = ["[0-9a-f]{7,40}"]

[default.extend-identifiers]
ND = "ND"
