[formatter.prettier]
command = "prettier"
options = ["--config", ".guardrails/prettier.cjs", "--write"]
excludes = [".agents/skills/.system/**", "artifacts/**"]
includes = [
  "*.cjs",
  "*.css",
  "*.entitlements",
  "*.html",
  "*.ipynb",
  "*.js",
  "*.json",
  "*.jsonc",
  "*.md",
  "*.mjs",
  "*.plist",
  "*.svg",
  "*.ts",
  "*.tsx",
  "*.xcscheme",
  "*.xcstrings",
  "*.xctestplan",
  "*.xcworkspacedata",
  "*.xml",
  "*.xsd",
  "*.yaml",
  "*.yml",
]

[formatter.shfmt]
command = "shfmt"
options = ["-w"]
excludes = ["config/zsh/**"]
includes = ["*.sh"]

[formatter.ruff]
command = "ruff"
options = ["format"]
includes = ["*.py"]

[formatter.taplo]
command = "taplo"
options = ["format"]
includes = ["*.toml"]

[formatter.swiftformat]
command = "swiftformat"
options = ["--config", ".guardrails/.swiftformat"]
includes = ["*.swift"]
