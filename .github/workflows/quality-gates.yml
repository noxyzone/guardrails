name: QualityGates

on:
  workflow_call:
    inputs:
      guardrails-ref:
        description: Revision of noxyzone/guardrails to checkout for shared guardrail assets.
        required: true
        type: string
      scope:
        description: File scope for quality gates. Use changed for PRs and all for scheduled or release backstops.
        required: false
        default: changed
        type: string

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      any: ${{ steps.changed.outputs.any }}
      ast_grep: ${{ steps.changed.outputs.ast_grep }}
      eslint: ${{ steps.changed.outputs.eslint }}
      localization: ${{ steps.changed.outputs.localization }}
      markdownlint: ${{ steps.changed.outputs.markdownlint }}
      ruff: ${{ steps.changed.outputs.ruff }}
      secretlint: ${{ steps.changed.outputs.secretlint }}
      shell: ${{ steps.changed.outputs.shell }}
      swift: ${{ steps.changed.outputs.swift }}
      text_spacing: ${{ steps.changed.outputs.text_spacing }}
      treefmt_non_swift: ${{ steps.changed.outputs.treefmt_non_swift }}
      typos: ${{ steps.changed.outputs.typos }}
      ubuntu: ${{ steps.changed.outputs.ubuntu }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Checkout guardrails
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          repository: noxyzone/guardrails
          ref: ${{ inputs.guardrails-ref }}
          path: .guardrails
          persist-credentials: false

      - name: Detect changed files
        id: changed
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha || github.event.before }}"
          head_sha="${{ github.event.pull_request.head.sha || github.sha }}"
          scope_args=(--changed --base "$base_sha" --head "$head_sha")
          if [[ "${{ inputs.scope }}" == "all" ]]; then
            scope_args=(--all)
          elif [[ "${{ inputs.scope }}" != "changed" ]]; then
            echo "error: scope must be changed or all" >&2
            exit 2
          fi
          .guardrails/scripts/quality-gate-change-detection.sh \
            --repo "$GITHUB_WORKSPACE" \
            "${scope_args[@]}" \
            --output "$GITHUB_OUTPUT"

  ubuntu_guardrails:
    if: ${{ needs.detect_changes.outputs.ubuntu == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - detect_changes
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Checkout guardrails
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          repository: noxyzone/guardrails
          ref: ${{ inputs.guardrails-ref }}
          path: .guardrails
          persist-credentials: false

      - name: Prepare changed-file targets
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha || github.event.before }}"
          head_sha="${{ github.event.pull_request.head.sha || github.sha }}"
          scope_args=(--changed --base "$base_sha" --head "$head_sha")
          if [[ "${{ inputs.scope }}" == "all" ]]; then
            scope_args=(--all)
          elif [[ "${{ inputs.scope }}" != "changed" ]]; then
            echo "error: scope must be changed or all" >&2
            exit 2
          fi
          target_dir="$RUNNER_TEMP/quality-gate-targets"
          mkdir -p "$target_dir"
          for kind in secretlint treefmt_non_swift text_spacing typos localization markdownlint eslint ruff shell; do
            .guardrails/scripts/quality-gate-targets.sh \
              --repo "$GITHUB_WORKSPACE" \
              "${scope_args[@]}" \
              --kind "$kind" >"$target_dir/$kind.bin"
          done

      - name: Install apt tools
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y jq shellcheck

      - name: Install npm tools
        if: ${{ needs.detect_changes.outputs.eslint == 'true' || needs.detect_changes.outputs.markdownlint == 'true' || needs.detect_changes.outputs.secretlint == 'true' || needs.detect_changes.outputs.treefmt_non_swift == 'true' }}
        run: |
          set -euo pipefail

          npm ci --prefix .guardrails/.github/quality-gates --ignore-scripts
          printf '%s\n' "$GITHUB_WORKSPACE/.guardrails/.github/quality-gates/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Install Ruff
        if: ${{ needs.detect_changes.outputs.ruff == 'true' || needs.detect_changes.outputs.treefmt_non_swift == 'true' }}
        run: |
          set -euo pipefail

          pipx install ruff==0.15.22

      - name: Install Treefmt tools
        if: ${{ needs.detect_changes.outputs.treefmt_non_swift == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          treefmt_tmp="$(mktemp -d)"
          gh release download v2.3.0 --repo numtide/treefmt --pattern treefmt_2.3.0_linux_amd64.tar.gz --output "$treefmt_tmp/treefmt.tar.gz"
          printf '%s  %s\n' '5d3ad279590f1c29c0e6b409dc2a6ce24ad4439e267be8eb0e4e671aed6c02a8' "$treefmt_tmp/treefmt.tar.gz" | sha256sum --check --strict
          tar xzf "$treefmt_tmp/treefmt.tar.gz" -C "$treefmt_tmp"
          sudo install "$treefmt_tmp/treefmt" /usr/local/bin/treefmt
          gh release download v3.13.1 --repo mvdan/sh --pattern shfmt_v3.13.1_linux_amd64 --output shfmt
          printf '%s  %s\n' 'fb096c5d1ac6beabbdbaa2874d025badb03ee07929f0c9ff67563ce8c75398b1' shfmt | sha256sum --check --strict
          sudo install shfmt /usr/local/bin/shfmt
          gh release download 0.10.0 --repo tamasfe/taplo --pattern taplo-linux-x86_64.gz --output taplo.gz
          printf '%s  %s\n' '8fe196b894ccf9072f98d4e1013a180306e17d244830b03986ee5e8eabeb6156' taplo.gz | sha256sum --check --strict
          gzip -d taplo.gz
          sudo install taplo /usr/local/bin/taplo

      - name: Install Typos
        if: ${{ needs.detect_changes.outputs.typos == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          typos_tmp="$(mktemp -d)"
          gh release download v1.48.0 --repo crate-ci/typos --pattern typos-v1.48.0-x86_64-unknown-linux-musl.tar.gz --output "$typos_tmp/typos.tar.gz"
          printf '%s  %s\n' '72a930c9a94fc3914aa56835c5b859c892a797d40c1c42638b98d93f16ff519c' "$typos_tmp/typos.tar.gz" | sha256sum --check --strict
          tar xzf "$typos_tmp/typos.tar.gz" -C "$typos_tmp"
          sudo install "$typos_tmp/typos" /usr/local/bin/typos

      - name: Run SecretLint
        if: ${{ needs.detect_changes.outputs.secretlint == 'true' }}
        run: |
          set -euo pipefail

          while IFS= read -r -d '' path; do
            [ -L "$path" ] || [ ! -e "$path" ] || printf '%s\0' "$path"
          done <"$RUNNER_TEMP/quality-gate-targets/secretlint.bin" \
            | xargs -0 -r "$GITHUB_WORKSPACE/.guardrails/.github/quality-gates/node_modules/.bin/secretlint" --secretlintrc .guardrails/.secretlintrc.json --

      - name: Run Treefmt
        if: ${{ needs.detect_changes.outputs.treefmt_non_swift == 'true' }}
        run: |
          set -euo pipefail

          export PATH="$GITHUB_WORKSPACE/.guardrails/.github/quality-gates/node_modules/.bin:$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin"
          targets="$RUNNER_TEMP/quality-gate-targets/treefmt_non_swift.bin"
          if [[ -s "$targets" ]]; then
            xargs -0 .guardrails/scripts/treefmt-check.sh --check --without-swiftformat --repo "$GITHUB_WORKSPACE" -- <"$targets"
          fi

      - name: Run TextSpacing
        if: ${{ needs.detect_changes.outputs.text_spacing == 'true' }}
        run: |
          set -euo pipefail

          text_spacing_files="$RUNNER_TEMP/quality-gate-targets/text_spacing.txt"
          tr '\0' '\n' <"$RUNNER_TEMP/quality-gate-targets/text_spacing.bin" >"$text_spacing_files"
          .guardrails/scripts/text-spacing-check.sh --files-from "$text_spacing_files" --repo "$GITHUB_WORKSPACE"

      - name: Run Typos
        if: ${{ needs.detect_changes.outputs.typos == 'true' }}
        run: |
          set -euo pipefail

          typos_files="$RUNNER_TEMP/quality-gate-targets/typos.txt"
          tr '\0' '\n' <"$RUNNER_TEMP/quality-gate-targets/typos.bin" >"$typos_files"
          .guardrails/scripts/typos-check.sh --files-from "$typos_files" --repo "$GITHUB_WORKSPACE"

      - name: Run Localization
        if: ${{ needs.detect_changes.outputs.localization == 'true' }}
        run: |
          set -euo pipefail

          localization_files="$RUNNER_TEMP/quality-gate-targets/localization.txt"
          tr '\0' '\n' <"$RUNNER_TEMP/quality-gate-targets/localization.bin" >"$localization_files"
          .guardrails/scripts/localization-check.sh --files-from "$localization_files" --repo "$GITHUB_WORKSPACE"

      - name: Run MarkdownLint
        if: ${{ needs.detect_changes.outputs.markdownlint == 'true' }}
        run: |
          set -euo pipefail

          markdownlint_ignore=".markdownlintignore"
          if [ ! -f "$markdownlint_ignore" ]; then
            markdownlint_ignore=".guardrails/.markdownlintignore"
          fi
          while IFS= read -r -d '' path; do
                ignored=false
                if [ -f "$markdownlint_ignore" ]; then
                  while IFS= read -r pattern || [ -n "$pattern" ]; do
                    [[ "$pattern" =~ ^#|^[[:space:]]*$ ]] && continue
                    prefix="${pattern%/}"
                    if [[ "$path" == "$prefix" || "$path" == "$prefix/"* ]]; then
                      ignored=true
                      break
                    fi
                  done < "$markdownlint_ignore"
                fi
            [ "$ignored" = true ] || printf '%s\0' "$path"
          done <"$RUNNER_TEMP/quality-gate-targets/markdownlint.bin" \
            | xargs -0 -r "$GITHUB_WORKSPACE/.guardrails/.github/quality-gates/node_modules/.bin/markdownlint-cli2" --config .guardrails/.markdownlint-cli2.yaml --

      - name: Run ESLint
        if: ${{ needs.detect_changes.outputs.eslint == 'true' }}
        run: |
          set -euo pipefail

          cat "$RUNNER_TEMP/quality-gate-targets/eslint.bin" \
            | xargs -0 -r "$GITHUB_WORKSPACE/.guardrails/.github/quality-gates/node_modules/.bin/eslint" --config .guardrails/eslint.config.js --no-config-lookup --

      - name: Run Ruff
        if: ${{ needs.detect_changes.outputs.ruff == 'true' }}
        run: |
          set -euo pipefail

          xargs -0 -r ruff check -- <"$RUNNER_TEMP/quality-gate-targets/ruff.bin"

      - name: Run Shebang
        if: ${{ needs.detect_changes.outputs.shell == 'true' }}
        run: |
          set -euo pipefail

          failed=0
          while IFS= read -r -d '' file; do
            if [[ "$file" == config/*.sh || "$file" == config/**/*.sh ]]; then
              if [ ! -x "$file" ] && head -1 -- "$file" | grep -qE '^#!'; then
                echo "[shebang] source用のconfig/*.shにはshebangを書かないでください: $file" >&2
                failed=1
                continue
              fi
            fi
            if head -1 -- "$file" | grep -qE '^#!/(bin|usr/bin)/(bash|sh|zsh|ksh|dash)'; then
              echo "[shebang] /usr/bin/envを使ってください: $file" >&2
              failed=1
            fi
          done <"$RUNNER_TEMP/quality-gate-targets/shell.bin"
          exit "$failed"

      - name: Run ShellCheck
        if: ${{ needs.detect_changes.outputs.shell == 'true' }}
        run: |
          set -euo pipefail

          while IFS= read -r -d '' path; do
            if [[ "$path" == *.sh ]] && [[ "$path" != */zsh/* ]]; then
              printf '%s\0' "$path"
            elif [ -f "$path" ] && file -- "$path" | grep -q 'shell script' && file -- "$path" | grep -qv 'zsh'; then
              printf '%s\0' "$path"
            fi
          done <"$RUNNER_TEMP/quality-gate-targets/shell.bin" | xargs -0 -r shellcheck --

      - name: Run LLMCLIStream
        if: ${{ needs.detect_changes.outputs.shell == 'true' }}
        run: |
          set -euo pipefail

          llm_cli_stream_files="$RUNNER_TEMP/quality-gate-targets/llm-cli-stream.txt"
          tr '\0' '\n' <"$RUNNER_TEMP/quality-gate-targets/shell.bin" >"$llm_cli_stream_files"
          .guardrails/scripts/llm-cli-stream-check.sh --files-from "$llm_cli_stream_files" --repo "$GITHUB_WORKSPACE"

  macos_guardrails:
    if: ${{ needs.detect_changes.outputs.swift == 'true' || needs.detect_changes.outputs.ast_grep == 'true' }}
    runs-on: macos-15
    timeout-minutes: 10
    needs:
      - detect_changes
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Checkout guardrails
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          repository: noxyzone/guardrails
          ref: ${{ inputs.guardrails-ref }}
          path: .guardrails
          persist-credentials: false

      - name: Prepare changed-file targets
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha || github.event.before }}"
          head_sha="${{ github.event.pull_request.head.sha || github.sha }}"
          scope_args=(--changed --base "$base_sha" --head "$head_sha")
          if [[ "${{ inputs.scope }}" == "all" ]]; then
            scope_args=(--all)
          elif [[ "${{ inputs.scope }}" != "changed" ]]; then
            echo "error: scope must be changed or all" >&2
            exit 2
          fi
          target_dir="$RUNNER_TEMP/quality-gate-targets"
          mkdir -p "$target_dir"
          for kind in ast_grep swift; do
            .guardrails/scripts/quality-gate-targets.sh \
              --repo "$GITHUB_WORKSPACE" \
              "${scope_args[@]}" \
              --kind "$kind" >"$target_dir/$kind.bin"
          done

      - name: Install Swift tools
        env:
          HOMEBREW_CORE_REVISION: d9fca872b542d66e0143ad467fa1e9ed6618d423
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          set -euo pipefail

          brew tap homebrew/core
          git -C "$(brew --repo homebrew/core)" fetch --depth=1 origin "$HOMEBREW_CORE_REVISION"
          git -C "$(brew --repo homebrew/core)" checkout --detach "$HOMEBREW_CORE_REVISION"
          brew install ast-grep swiftformat swiftlint

      - name: Run ast-grep
        if: ${{ needs.detect_changes.outputs.ast_grep == 'true' }}
        run: |
          set -euo pipefail

          targets="$RUNNER_TEMP/quality-gate-targets/ast_grep.bin"
          if [[ -s "$targets" ]]; then
            xargs -0 ast-grep scan --config .guardrails/sgconfig.yml --report-style short -- <"$targets"
          fi

      - name: Run SwiftLint
        run: |
          set -euo pipefail

          targets="$RUNNER_TEMP/quality-gate-targets/swift.bin"
          if [[ -s "$targets" ]]; then
            xargs -0 swiftlint lint --force-exclude --no-cache --config .guardrails/.swiftlint.yml -- <"$targets"
          fi

      - name: Verify shared formatter config links
        run: |
          set -euo pipefail

          if git ls-files --error-unmatch .swiftformat >/dev/null 2>&1; then
            echo "::error file=.swiftformat::.swiftformat must not be tracked. Shared SwiftFormat config is provided by noxyzone/guardrails."
            exit 1
          fi

      - name: Run SwiftFormat
        run: |
          set -euo pipefail

          targets="$RUNNER_TEMP/quality-gate-targets/swift.bin"
          if [[ -s "$targets" ]]; then
            xargs -0 swiftformat --lint --config .guardrails/.swiftformat -- <"$targets"
          fi

  quality_gates:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - detect_changes
      - ubuntu_guardrails
      - macos_guardrails
    permissions:
      contents: read
    steps:
      - name: Confirm guardrail jobs
        run: |
          set -euo pipefail

          if [[ "${{ needs.detect_changes.result }}" != "success" ]]; then
            echo "::error::detect-changes job did not succeed"
            exit 1
          fi
          for result in "${{ needs.ubuntu_guardrails.result }}" "${{ needs.macos_guardrails.result }}"; do
            case "$result" in
              success|skipped) ;;
              *)
                echo "::error::guardrail job did not succeed: $result"
                exit 1
                ;;
            esac
          done
          echo "Quality gates completed"
