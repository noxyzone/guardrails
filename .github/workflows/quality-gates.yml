name: QualityGates

on:
  workflow_call:
    inputs:
      guardrails-ref:
        description: Revision of noxyzone/guardrails to checkout for shared guardrail assets.
        required: true
        type: string

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      any: ${{ steps.changed.outputs.any }}
      ast_grep: ${{ steps.changed.outputs.ast_grep }}
      eslint: ${{ steps.changed.outputs.eslint }}
      localization: ${{ steps.changed.outputs.localization }}
      markdownlint: ${{ steps.changed.outputs.markdownlint }}
      ruff: ${{ steps.changed.outputs.ruff }}
      secretlint: ${{ steps.changed.outputs.secretlint }}
      shell: ${{ steps.changed.outputs.shell }}
      swift: ${{ steps.changed.outputs.swift }}
      text_spacing: ${{ steps.changed.outputs.text_spacing }}
      treefmt_non_swift: ${{ steps.changed.outputs.treefmt_non_swift }}
      typos: ${{ steps.changed.outputs.typos }}
      ubuntu: ${{ steps.changed.outputs.ubuntu }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect changed files
        id: changed
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha || github.event.before }}"
          head_sha="${{ github.event.pull_request.head.sha || github.sha }}"
          if [ -n "$base_sha" ] && [ "$base_sha" != "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git diff --name-only --diff-filter=ACMRT "$base_sha" "$head_sha")"
          else
            changed_files="$(git ls-files)"
          fi

          has_changed() {
            local pattern="$1"
            [ -n "$changed_files" ] && printf '%s\n' "$changed_files" | grep -Eq "$pattern"
          }

          bool_for() {
            if has_changed "$1"; then
              printf '%s\n' true
            else
              printf '%s\n' false
            fi
          }

          any="$(bool_for '.+')"
          ast_grep="$(bool_for '\.swift$')"
          eslint="$(bool_for '\.(cjs|js|mjs|ts)$')"
          localization="$(bool_for '\.(swift|xcstrings)$')"
          markdownlint="$(bool_for '\.md$')"
          ruff="$(bool_for '\.py$')"
          shell="$(bool_for '\.sh$')"
          swift="$(bool_for '\.swift$')"
          text_spacing="$(bool_for '\.(css|html|json|jsonc|md|toml|txt|yaml|yml)$')"
          treefmt_non_swift="$(bool_for '\.(cjs|css|entitlements|html|ipynb|js|json|jsonc|md|mjs|plist|py|sh|svg|toml|ts|tsx|xcscheme|xcstrings|xctestplan|xcworkspacedata|xml|xsd|yaml|yml)$')"
          secretlint="$any"
          typos="$any"

          ubuntu=false
          for needed in "$eslint" "$localization" "$markdownlint" "$ruff" "$secretlint" "$shell" "$text_spacing" "$treefmt_non_swift" "$typos"; do
            if [ "$needed" = true ]; then
              ubuntu=true
            fi
          done

          {
            printf 'any=%s\n' "$any"
            printf 'ast_grep=%s\n' "$ast_grep"
            printf 'eslint=%s\n' "$eslint"
            printf 'localization=%s\n' "$localization"
            printf 'markdownlint=%s\n' "$markdownlint"
            printf 'ruff=%s\n' "$ruff"
            printf 'secretlint=%s\n' "$secretlint"
            printf 'shell=%s\n' "$shell"
            printf 'swift=%s\n' "$swift"
            printf 'text_spacing=%s\n' "$text_spacing"
            printf 'treefmt_non_swift=%s\n' "$treefmt_non_swift"
            printf 'typos=%s\n' "$typos"
            printf 'ubuntu=%s\n' "$ubuntu"
          } >> "$GITHUB_OUTPUT"

  ubuntu_guardrails:
    if: ${{ needs.detect_changes.outputs.ubuntu == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - detect_changes
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          persist-credentials: false

      - name: Checkout guardrails
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          repository: noxyzone/guardrails
          ref: ${{ inputs.guardrails-ref }}
          path: .guardrails
          persist-credentials: false

      - name: Install apt tools
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y jq shellcheck

      - name: Install npm tools
        if: ${{ needs.detect_changes.outputs.eslint == 'true' || needs.detect_changes.outputs.markdownlint == 'true' || needs.detect_changes.outputs.secretlint == 'true' || needs.detect_changes.outputs.treefmt_non_swift == 'true' }}
        run: |
          set -euo pipefail

          npm ci --prefix .guardrails/.github/quality-gates --ignore-scripts
          printf '%s\n' "$GITHUB_WORKSPACE/.guardrails/.github/quality-gates/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Install Ruff
        if: ${{ needs.detect_changes.outputs.ruff == 'true' || needs.detect_changes.outputs.treefmt_non_swift == 'true' }}
        run: |
          set -euo pipefail

          pipx install ruff==0.15.22

      - name: Install Treefmt tools
        if: ${{ needs.detect_changes.outputs.treefmt_non_swift == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          treefmt_tmp="$(mktemp -d)"
          gh release download v2.3.0 --repo numtide/treefmt --pattern treefmt_2.3.0_linux_amd64.tar.gz --output "$treefmt_tmp/treefmt.tar.gz"
          printf '%s  %s\n' '5d3ad279590f1c29c0e6b409dc2a6ce24ad4439e267be8eb0e4e671aed6c02a8' "$treefmt_tmp/treefmt.tar.gz" | sha256sum --check --strict
          tar xzf "$treefmt_tmp/treefmt.tar.gz" -C "$treefmt_tmp"
          sudo install "$treefmt_tmp/treefmt" /usr/local/bin/treefmt
          gh release download v3.13.1 --repo mvdan/sh --pattern shfmt_v3.13.1_linux_amd64 --output shfmt
          printf '%s  %s\n' 'fb096c5d1ac6beabbdbaa2874d025badb03ee07929f0c9ff67563ce8c75398b1' shfmt | sha256sum --check --strict
          sudo install shfmt /usr/local/bin/shfmt
          gh release download 0.10.0 --repo tamasfe/taplo --pattern taplo-linux-x86_64.gz --output taplo.gz
          printf '%s  %s\n' '8fe196b894ccf9072f98d4e1013a180306e17d244830b03986ee5e8eabeb6156' taplo.gz | sha256sum --check --strict
          gzip -d taplo.gz
          sudo install taplo /usr/local/bin/taplo

      - name: Install Typos
        if: ${{ needs.detect_changes.outputs.typos == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          typos_tmp="$(mktemp -d)"
          gh release download v1.48.0 --repo crate-ci/typos --pattern typos-v1.48.0-x86_64-unknown-linux-musl.tar.gz --output "$typos_tmp/typos.tar.gz"
          printf '%s  %s\n' '72a930c9a94fc3914aa56835c5b859c892a797d40c1c42638b98d93f16ff519c' "$typos_tmp/typos.tar.gz" | sha256sum --check --strict
          tar xzf "$typos_tmp/typos.tar.gz" -C "$typos_tmp"
          sudo install "$typos_tmp/typos" /usr/local/bin/typos

      - name: Run SecretLint
        if: ${{ needs.detect_changes.outputs.secretlint == 'true' }}
        run: |
          set -euo pipefail

          git ls-files -z \
            | .guardrails/scripts/quality-gate-path-filter.sh --null \
            | while IFS= read -r -d '' path; do
                [ -L "$path" ] || [ ! -e "$path" ] || printf '%s\0' "$path"
              done \
            | xargs -0 -r npx secretlint --secretlintrc .guardrails/.secretlintrc.json --

      - name: Run Treefmt
        if: ${{ needs.detect_changes.outputs.treefmt_non_swift == 'true' }}
        run: |
          set -euo pipefail

          export PATH="$HOME/.local/bin:$PWD/node_modules/.bin:$PATH"
          .guardrails/scripts/treefmt-check.sh --check --without-swiftformat --repo "$GITHUB_WORKSPACE"

      - name: Run TextSpacing
        if: ${{ needs.detect_changes.outputs.text_spacing == 'true' }}
        run: |
          set -euo pipefail

          .guardrails/scripts/text-spacing-check.sh --all --repo "$GITHUB_WORKSPACE"

      - name: Run Typos
        if: ${{ needs.detect_changes.outputs.typos == 'true' }}
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha || github.event.before }}"
          head_sha="${{ github.event.pull_request.head.sha || github.sha }}"
          .guardrails/scripts/typos-check.sh --changed --base "$base_sha" --head "$head_sha" --repo "$GITHUB_WORKSPACE"

      - name: Run Localization
        if: ${{ needs.detect_changes.outputs.localization == 'true' }}
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha || github.event.before }}"
          head_sha="${{ github.event.pull_request.head.sha || github.sha }}"
          .guardrails/scripts/localization-check.sh --changed --base "$base_sha" --head "$head_sha" --repo "$GITHUB_WORKSPACE"

      - name: Run MarkdownLint
        if: ${{ needs.detect_changes.outputs.markdownlint == 'true' }}
        run: |
          set -euo pipefail

          markdownlint_ignore=".markdownlintignore"
          if [ ! -f "$markdownlint_ignore" ]; then
            markdownlint_ignore=".guardrails/.markdownlintignore"
          fi
          git ls-files -z '*.md' \
            | while IFS= read -r -d '' path; do
                ignored=false
                if [ -f "$markdownlint_ignore" ]; then
                  while IFS= read -r pattern || [ -n "$pattern" ]; do
                    [[ "$pattern" =~ ^#|^[[:space:]]*$ ]] && continue
                    prefix="${pattern%/}"
                    if [[ "$path" == "$prefix" || "$path" == "$prefix/"* ]]; then
                      ignored=true
                      break
                    fi
                  done < "$markdownlint_ignore"
                fi
                [ "$ignored" = true ] || printf '%s\0' "$path"
              done \
            | xargs -0 -r npx markdownlint-cli2 --config .guardrails/.markdownlint-cli2.yaml --

      - name: Run ESLint
        if: ${{ needs.detect_changes.outputs.eslint == 'true' }}
        run: |
          set -euo pipefail

          git ls-files -z \
            | .guardrails/scripts/quality-gate-path-filter.sh --null \
            | while IFS= read -r -d '' path; do
                [[ "$path" =~ \.(js|cjs|mjs|ts)$ ]] && printf '%s\0' "$path"
              done \
            | xargs -0 -r npx eslint --config .guardrails/eslint.config.js --no-config-lookup --

      - name: Run Ruff
        if: ${{ needs.detect_changes.outputs.ruff == 'true' }}
        run: |
          set -euo pipefail

          git ls-files -z '*.py' | xargs -0 -r ruff check --

      - name: Run Shebang
        if: ${{ needs.detect_changes.outputs.shell == 'true' }}
        run: |
          set -euo pipefail

          failed=0
          while IFS= read -r -d '' file; do
            if [[ "$file" == config/*.sh || "$file" == config/**/*.sh ]]; then
              if [ ! -x "$file" ] && head -1 -- "$file" | grep -qE '^#!'; then
                echo "[shebang] source用のconfig/*.shにはshebangを書かないでください: $file" >&2
                failed=1
                continue
              fi
            fi
            if head -1 -- "$file" | grep -qE '^#!/(bin|usr/bin)/(bash|sh|zsh|ksh|dash)'; then
              echo "[shebang] /usr/bin/envを使ってください: $file" >&2
              failed=1
            fi
          done < <(git ls-files -z | while IFS= read -r -d '' path; do
            if [[ "$path" == *.sh ]]; then
              printf '%s\0' "$path"
            elif [ -f "$path" ] && file -- "$path" | grep -q 'shell script'; then
              printf '%s\0' "$path"
            fi
          done)
          exit "$failed"

      - name: Run ShellCheck
        if: ${{ needs.detect_changes.outputs.shell == 'true' }}
        run: |
          set -euo pipefail

          git ls-files -z | while IFS= read -r -d '' path; do
            if [[ "$path" == *.sh ]] && [[ "$path" != */zsh/* ]]; then
              printf '%s\0' "$path"
            elif [ -f "$path" ] && file -- "$path" | grep -q 'shell script' && file -- "$path" | grep -qv 'zsh'; then
              printf '%s\0' "$path"
            fi
          done | xargs -0 -r shellcheck --

  macos_guardrails:
    if: ${{ needs.detect_changes.outputs.swift == 'true' }}
    runs-on: macos-15
    timeout-minutes: 10
    needs:
      - detect_changes
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          persist-credentials: false

      - name: Checkout guardrails
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          repository: noxyzone/guardrails
          ref: ${{ inputs.guardrails-ref }}
          path: .guardrails
          persist-credentials: false

      - name: Install Swift tools
        env:
          HOMEBREW_CORE_REVISION: d9fca872b542d66e0143ad467fa1e9ed6618d423
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          set -euo pipefail

          brew tap homebrew/core
          git -C "$(brew --repo homebrew/core)" fetch --depth=1 origin "$HOMEBREW_CORE_REVISION"
          git -C "$(brew --repo homebrew/core)" checkout --detach "$HOMEBREW_CORE_REVISION"
          brew install ast-grep swiftformat swiftlint

      - name: Run ast-grep
        if: ${{ needs.detect_changes.outputs.ast_grep == 'true' }}
        run: |
          set -euo pipefail

          git ls-files -z '*.swift' ':!:DerivedData/**' ':!:.build/**' ':!:build/**' \
            | xargs -0 ast-grep scan --config .guardrails/sgconfig.yml --report-style short --

      - name: Run SwiftLint
        run: |
          set -euo pipefail

          git ls-files -z '*.swift' ':!:DerivedData/**' ':!:.build/**' ':!:build/**' \
            | xargs -0 swiftlint lint --force-exclude --no-cache --config .guardrails/.swiftlint.yml --

      - name: Verify shared formatter config links
        run: |
          set -euo pipefail

          if git ls-files --error-unmatch .swiftformat >/dev/null 2>&1; then
            echo "::error file=.swiftformat::.swiftformat must not be tracked. Shared SwiftFormat config is provided by noxyzone/guardrails."
            exit 1
          fi

      - name: Run SwiftFormat
        run: |
          set -euo pipefail

          git ls-files -z '*.swift' ':!:DerivedData/**' ':!:.build/**' ':!:build/**' \
            | xargs -0 swiftformat --lint --config .guardrails/.swiftformat --

  quality_gates:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - detect_changes
      - ubuntu_guardrails
      - macos_guardrails
    permissions:
      contents: read
    steps:
      - name: Confirm guardrail jobs
        run: |
          set -euo pipefail

          if [[ "${{ needs.detect_changes.result }}" != "success" ]]; then
            echo "::error::detect-changes job did not succeed"
            exit 1
          fi
          for result in "${{ needs.ubuntu_guardrails.result }}" "${{ needs.macos_guardrails.result }}"; do
            case "$result" in
              success|skipped) ;;
              *)
                echo "::error::guardrail job did not succeed: $result"
                exit 1
                ;;
            esac
          done
          echo "Quality gates completed"
