name: ShellCheck

on:
  workflow_call:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          files="$(git ls-files | while IFS= read -r path; do
            if [[ "$path" == *.sh ]] && [[ "$path" != */zsh/* ]]; then
              printf '%s\n' "$path"
            elif [ -f "$path" ] && file "$path" | grep -q 'shell script' && file "$path" | grep -qv 'zsh'; then
              printf '%s\n' "$path"
            fi
          done)"
          if [ -n "$files" ]; then
            printf '%s\n' "$files" | xargs shellcheck
          fi
