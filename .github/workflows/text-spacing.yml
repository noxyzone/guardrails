name: TextSpacing

on:
  workflow_call:

jobs:
  text-spacing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout guardrails
        uses: actions/checkout@v4
        with:
          repository: noxyzone/guardrails
          path: .guardrails

      - name: Check Japanese alphanumeric spacing
        run: |
          .guardrails/scripts/text-spacing-check.sh --all --repo "$GITHUB_WORKSPACE"
