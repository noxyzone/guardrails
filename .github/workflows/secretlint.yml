name: SecretLint

on:
  workflow_call:

jobs:
  secretlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout guardrails
        uses: actions/checkout@v4
        with:
          repository: noxyzone/guardrails
          path: .guardrails

      - name: Install SecretLint
        run: npm install -g secretlint@13.0.2 @secretlint/secretlint-rule-preset-recommend@13.0.2

      - name: Run SecretLint
        run: |
          files="$(git ls-files | while IFS= read -r path; do
            [ -L "$path" ] || [ ! -e "$path" ] || printf '%s\n' "$path"
          done)"
          if [ -n "$files" ]; then
            printf '%s\n' "$files" | xargs secretlint --secretlintrc .guardrails/.secretlintrc.json
          fi
